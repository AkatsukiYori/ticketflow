services:
  app:
    build: ./backend
    container_name: ticketflow_app
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    command: >
      sh -c "
      sleep 5 &&
      pnpm prisma generate &&
      pnpm prisma migrate deploy &&
      pnpm dev
      "

  frontend:
    build: ./frontend
    container_name: ticketflow_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

  studio:
    container_name: ticketflow_studio
    build: ./backend
    command: pnpm studio
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: ticketflow_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: akatsukiyori
      POSTGRES_PASSWORD: "yori!@#"
      POSTGRES_DB: ticketflow
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: